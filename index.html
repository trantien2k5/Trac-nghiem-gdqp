<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ôn Tập Trắc Nghiệm GDQP</title>
<style>
  :root{
    --bg: #F6F7FB;
    --bg-elev: #FFFFFF;
    --border: #E3E6EF;
    --indigo: #6366F1;
    --indigo-soft: #4F46E5;
    --text: #14162A;
    --text-dim: #6B7086;
    --radius: 16px;
    --shadow-card: 0 1px 2px rgba(20,22,42,0.04), 0 1px 1px rgba(20,22,42,0.03);
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
  }
  #app{ max-width: 560px; margin: 0 auto; padding: 28px 20px 32px; }
  .eyebrow{
    font-size:12px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase;
    color: var(--indigo); margin-bottom:8px;
  }
  h1{ font-size: 26px; font-weight: 700; letter-spacing:-0.02em; margin:0 0 6px; line-height:1.2; }
  p.desc{ font-size: 14px; color: var(--text-dim); margin:0 0 20px; line-height:1.5; }
  .hp-list{ display:flex; flex-direction:column; gap:12px; }
  .hp-card{
    display:block; text-decoration:none; color:inherit;
    background: var(--bg-elev); border:1px solid var(--border); border-radius: var(--radius);
    padding: 18px; box-shadow: var(--shadow-card);
  }
  .hp-card .hp-name{ font-size:17px; font-weight:700; letter-spacing:-0.01em; }
  .hp-card .hp-desc{ font-size:13px; color: var(--text-dim); margin-top:4px; }
</style>
</head>
<body>
<div id="app">
  <div class="eyebrow">GDQP</div>
  <h1>Ôn Tập Trắc Nghiệm</h1>
  <p class="desc">Chọn học phần để bắt đầu ôn tập.</p>
  <div class="hp-list">
    <a class="hp-card" href="hp2/">
      <div class="hp-name">Học phần 2</div>
      <div class="hp-desc">160 câu · 8 đề</div>
    </a>
  </div>
</div>
</body>
</html>
